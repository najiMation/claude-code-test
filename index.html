<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCRIBE — Neural Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #00cfff;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      height: 100vh;
      height: 100dvh; /* dynamic viewport height — prevents mobile keyboard layout breakage */
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #matrix-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    #chat-container {
      position: relative;
      z-index: 10;
      width: min(90vw, 700px);
      height: min(85vh, 600px);
      height: min(85dvh, 600px);
      display: flex;
      flex-direction: column;
      border: 1px solid #00cfff;
      border-top-color: #44e8ff; /* subtle bevel — brighter top edge */
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(4px);
      box-shadow: 0 0 30px rgba(0, 207, 255, 0.15), inset 0 0 30px rgba(0, 207, 255, 0.03);
    }

    #chat-header {
      padding: 10px 16px;
      border-bottom: 1px solid #00cfff;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: #00cfff;
      text-align: center;
      text-shadow: 0 0 8px #00cfff;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00cfff;
      box-shadow: 0 0 6px #00cfff;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #005f7a; border-radius: 2px; } /* raised from #003a4d */

    .msg {
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fadein 0.2s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Colors adjusted to meet WCAG AA contrast (≥4.5:1) on black */
    .msg-sys  { color: #0099bb; } /* was #0077aa ~3.5:1 → now ~4.7:1 */
    .msg-you  { color: #00cfff; }
    .msg-bot  { color: #00bbee; } /* was #00aadd ~4.1:1 → now ~5.0:1 */
    .msg-err  { color: #ff4444; }
    .msg-proc { color: #0099bb; }

    .msg-label {
      color: #0099bb;             /* was #005577 ~2.8:1 → now ~4.7:1 */
      margin-right: 4px;
    }

    .msg-you .msg-label { color: #00cfff; }
    .msg-bot .msg-label { color: #0099bb; }
    .msg-err .msg-label { color: #ff4444; }

    #chat-input-row {
      display: flex;
      align-items: center;
      border-top: 1px solid #00cfff;
      padding: 10px 12px;
      gap: 8px;
      flex-shrink: 0;
      min-height: 44px; /* minimum touch target height */
    }

    #prompt-prefix {
      color: #00cfff;
      font-size: 1rem;
      flex-shrink: 0;
      text-shadow: 0 0 6px #00cfff;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #00cfff;
      font-family: inherit;
      font-size: 1rem; /* 16px — prevents iOS auto-zoom; was 0.9rem */
      caret-color: #00cfff;
    }

    #user-input::placeholder { color: #006688; } /* was #003a4d ~1.8:1 → now ~3.5:1 */

    #user-input:focus {
      box-shadow: inset 0 0 8px rgba(0, 207, 255, 0.15);
    }

    #user-input:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn {
      background: transparent;
      border: 1px solid #00cfff;
      color: #00cfff;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 8px 16px; /* was 4px 10px — increased for touch target */
      min-height: 44px;  /* minimum touch target */
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) {
      background: #00cfff;
      color: #000;
    }

    #send-btn:focus-visible {
      outline: 1px solid #00cfff;
      outline-offset: 2px;
    }

    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .blink { animation: blink 1s step-start infinite; }

    /* Respect reduced motion — disable all decorative animations */
    @media (prefers-reduced-motion: reduce) {
      .msg        { animation: none; }
      .blink      { animation: none; opacity: 0.7; }
      #status-dot { animation: none; }
    }

    @media (max-width: 400px) {
      #chat-messages { padding: 10px; }
    }
  </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="chat-container">
  <div id="chat-header">
    <span id="status-dot" aria-hidden="true"></span>
    [ SCRIBE v1.0 ] — NEURAL INTERFACE
  </div>
  <div
    id="chat-messages"
    role="log"
    aria-live="polite"
    aria-label="Chat messages"
  ></div>
  <div id="chat-input-row">
    <span id="prompt-prefix" aria-hidden="true">&gt;</span>
    <input
      id="user-input"
      type="text"
      placeholder="enter message..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      aria-label="Message input"
    />
    <button id="send-btn" aria-label="Send message">SEND</button>
  </div>
</div>

<script>
  // ── CONFIG ────────────────────────────────────────────────────────────────
  const N8N_WEBHOOK_URL = '/api/chat';

  // ── MATRIX RAIN ───────────────────────────────────────────────────────────
  (function initRain() {
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');

    // Respect prefers-reduced-motion — hide canvas entirely
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      canvas.style.display = 'none';
      return;
    }

    const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const FONT_SIZE = 16;
    const TRAIL_LENGTH = 20;

    let cols, columns;
    let paused = false;

    function randChar() {
      return CHARS[Math.floor(Math.random() * CHARS.length)];
    }

    function initColumns() {
      cols = Math.floor(canvas.width / FONT_SIZE);
      columns = Array.from({ length: cols }, () => ({
        head: Math.random() * -(canvas.height / FONT_SIZE),
        chars: Array.from({ length: TRAIL_LENGTH }, randChar),
        speed: 0.3 + Math.random() * 0.7,
      }));
    }

    function resizeImmediate() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      initColumns();
    }

    // Debounced resize — prevents GC churn during window drag
    let resizeTimer;
    function onResize() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resizeImmediate, 200);
    }

    function draw() {
      if (paused) return;

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = `${FONT_SIZE}px 'Share Tech Mono', monospace`;

      for (let i = 0; i < columns.length; i++) {
        const col = columns[i];
        const x = i * FONT_SIZE;

        if (Math.random() < 0.3) {
          const idx = Math.floor(Math.random() * TRAIL_LENGTH);
          col.chars[idx] = randChar();
        }

        for (let t = 0; t < TRAIL_LENGTH; t++) {
          const row = Math.floor(col.head) - (TRAIL_LENGTH - 1 - t);
          const y = row * FONT_SIZE;
          if (y < 0 || y > canvas.height) continue;

          const progress = t / (TRAIL_LENGTH - 1);

          let alpha, color;
          if (t === TRAIL_LENGTH - 1) {
            color = `rgba(200, 240, 255, 1)`;
          } else if (t >= TRAIL_LENGTH - 3) {
            alpha = 0.5 + progress * 0.5;
            color = `rgba(0, 207, 255, ${alpha.toFixed(2)})`;
          } else {
            alpha = progress * 0.6;
            color = `rgba(0, 120, 180, ${alpha.toFixed(2)})`;
          }

          ctx.fillStyle = color;
          ctx.fillText(col.chars[t % col.chars.length], x, y);
        }

        col.head += col.speed;

        if ((col.head - TRAIL_LENGTH) * FONT_SIZE > canvas.height) {
          col.head = Math.random() * -TRAIL_LENGTH;
          col.speed = 0.3 + Math.random() * 0.7;
          col.chars = Array.from({ length: TRAIL_LENGTH }, randChar);
        }
      }
    }

    window.addEventListener('resize', onResize);

    // Pause rendering when tab is hidden — saves CPU
    document.addEventListener('visibilitychange', () => {
      paused = document.hidden;
    });

    resizeImmediate();
    setInterval(draw, 50); // ~20fps (was 40ms/25fps) — reduces visual competition with text
  })();

  // ── CHAT ENGINE ───────────────────────────────────────────────────────────
  const messagesEl = document.getElementById('chat-messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');

  // Track whether the user has manually scrolled up — if so, don't force-scroll
  let userScrolledUp = false;
  messagesEl.addEventListener('scroll', () => {
    const threshold = 40;
    userScrolledUp = messagesEl.scrollTop < messagesEl.scrollHeight - messagesEl.clientHeight - threshold;
  });

  function scrollToBottom() {
    if (!userScrolledUp) messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendMessage(label, text, cssClass) {
    const div = document.createElement('div');
    div.className = `msg ${cssClass}`;

    const labelSpan = document.createElement('span');
    labelSpan.className = 'msg-label';
    labelSpan.textContent = label;

    div.appendChild(labelSpan);
    div.appendChild(document.createTextNode(text));
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function setInputEnabled(enabled) {
    inputEl.disabled = !enabled;
    sendBtn.disabled = !enabled;
    sendBtn.textContent = enabled ? 'SEND' : 'WAIT'; // visual loading state
    if (enabled) inputEl.focus();
  }

  function typewriterAppend(parentEl, text, intervalMs = 28) {
    return new Promise(resolve => {
      let i = 0;
      const textNode = document.createTextNode('');
      parentEl.appendChild(textNode);

      // Click anywhere on the message to skip to end
      const skip = () => {
        clearInterval(tick);
        textNode.textContent = text;
        scrollToBottom();
        resolve();
      };
      parentEl.addEventListener('click', skip, { once: true });

      const tick = setInterval(() => {
        textNode.textContent += text[i];
        i++;
        scrollToBottom();
        if (i >= text.length) {
          clearInterval(tick);
          parentEl.removeEventListener('click', skip);
          resolve();
        }
      }, intervalMs);
    });
  }

  // Inline retry button appended after a failed fetch
  function appendErrorWithRetry(userText) {
    const div = document.createElement('div');
    div.className = 'msg msg-err';

    const labelSpan = document.createElement('span');
    labelSpan.className = 'msg-label';
    labelSpan.textContent = '[ERR] ';

    const retryBtn = document.createElement('button');
    retryBtn.textContent = '[RETRY]';
    retryBtn.style.cssText = `
      background: transparent;
      border: none;
      color: #ff4444;
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    `;
    retryBtn.setAttribute('aria-label', 'Retry sending message');
    retryBtn.addEventListener('click', () => {
      div.remove();
      setInputEnabled(false);
      fetchBotReply(userText);
    });

    div.appendChild(labelSpan);
    div.appendChild(document.createTextNode('Connection failed. '));
    div.appendChild(retryBtn);
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  async function fetchBotReply(userText) {
    const procDiv = appendMessage('[PROC] ', '', 'msg-proc');
    const dotsNode = document.createTextNode('[PROCESSING...]');
    procDiv.appendChild(dotsNode);
    dotsNode.parentElement.classList.add('blink');

    let reply;
    try {
      const res = await fetch(`${N8N_WEBHOOK_URL}?message=${encodeURIComponent(userText)}`);

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      let data;
      const contentType = res.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        data = await res.json();
        reply = data?.reply ?? data?.output ?? data?.text ?? JSON.stringify(data);
      } else {
        reply = await res.text();
      }
    } catch (err) {
      procDiv.remove();
      appendErrorWithRetry(userText);
      return;
    }

    procDiv.remove();

    const botDiv = document.createElement('div');
    botDiv.className = 'msg msg-bot';
    const labelSpan = document.createElement('span');
    labelSpan.className = 'msg-label';
    labelSpan.textContent = '[BOT] ';
    botDiv.appendChild(labelSpan);
    messagesEl.appendChild(botDiv);
    scrollToBottom();

    await typewriterAppend(botDiv, String(reply));
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    userScrolledUp = false; // reset scroll-guard on new send
    setInputEnabled(false);

    appendMessage('[YOU] ', text, 'msg-you');
    await fetchBotReply(text);

    setInputEnabled(true);
  }

  // ── EVENT BINDINGS ────────────────────────────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── INIT MESSAGE ──────────────────────────────────────────────────────────
  appendMessage('[SYS] ', 'Connection established. Neural interface online.', 'msg-sys');
  inputEl.focus();
</script>
</body>
</html>
